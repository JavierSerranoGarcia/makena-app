workflows:
  ios-release:
    name: iOS Release (App Store / TestFlight)
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: 3.44.0
      xcode: latest
      cocoapods: default
      # These variable groups must be created in the Codemagic UI:
      #   app_store_credentials  → APP_STORE_CONNECT_KEY_IDENTIFIER
      #                            APP_STORE_CONNECT_ISSUER_ID
      #                            APP_STORE_CONNECT_PRIVATE_KEY
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.makena.app.makena"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.makena.app.makena

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - javier.serrano.garcia@gmail.com
        notify:
          success: true
          failure: true
